services:
  codex:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CODEX_VERSION: "0.128.0"

    image: codex-local:0.128.0
    container_name: codex-local

    working_dir: /workspace

    stdin_open: true
    tty: true

    user: "node"

    volumes:
      # example
      # - ./project_workspace:/workspace

      # project
      # - ../www/laravel-site/web-site:/workspace

      # Codex space
      - ./coder/.codex:/home/node/.codex

      # Optional read-only reference repo/example docs:
      # - ./reference_repo:/reference:ro

    environment:
      HOME: /home/node
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    pids_limit: 256
    mem_limit: 4g
    cpus: 2.0

    restart: "no"

    command: ["codex"]